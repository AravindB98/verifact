name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t verifact:ci .
      - name: Smoke test
        run: |
          docker run -d --rm -p 8000:8000 --name vf verifact:ci
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8000/api/v1/health && break || sleep 1
          done
          curl -sf http://127.0.0.1:8000/api/v1/health | grep '"ok"'
          docker stop vf
